services:
  pytrix:
    build:
      context: .
      dockerfile: .docker/Dockerfile.dev
      args:
        - DEV_USER=${DEV_USER:-developer}
        - DEV_PASS=${DEV_PASS:-pytrix123}
    container_name: pytrix_dev_env
    restart: always

    # Injeta os DNS externos para o container conseguir baixar pacotes
    dns:
      - ${PRIMARY_DNS:-8.8.8.8}
      - ${SECONDARY_DNS:-1.1.1.1}

    # Variáveis de ambiente para o script de setup-dns.sh e Flask
    environment:
      - DEV_USER=${DEV_USER:-developer}
      - LOCAL_DOMAIN=${LOCAL_DOMAIN:-pytrix.local}
      - CAPTURE_TARGET=${CLIENT_DOMAIN_TO_CAPTURE}

    # Portas: Mapeando para o Host (Debian)
    ports:
      - "${SSH_PORT:-2222}:22"      # SSH para equipe/remoto
      - "${HTTP_PORT:-80}:80"       # Web (Captura HTTP)
      - "${HTTPS_PORT:-443}:443"    # Web (Captura HTTPS)
      - "53:53/tcp"                 # DNS (TCP)
      - "53:53/udp"                 # DNS (UDP)

# ... (portas e environment acima)

    # Adicione isso para permitir que o Bind9 e o script de IP Reverso funcionem
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN

    volumes:
      # Sincroniza seu código (Neovim/Sublime no Host <-> Container)
      - .:/home/${DEV_USER:-developer}/pytrix
      # Mantém suas chaves SSH e configurações de Git persistentes
      - .ssh_cache:/home/${DEV_USER:-developer}/.ssh
      # Opcional: Para você ver os logs do Bind9 direto na sua pasta .docker
      - .docker/dns/logs:/var/log/named

networks:
  default:
    name: pytrix_network
    driver: bridge






