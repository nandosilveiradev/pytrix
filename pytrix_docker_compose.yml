networks:
  pytrix_network:
    name: pytrix_network
    driver: bridge

services:
  pytrix_web_static:
    image: alpine:latest
    container_name: pytrix_static
    restart: always
    command: >
      sh -c "apk add --no-cache nginx && 
             mkdir -p /run/nginx && 
             echo 'server { listen 80; location / { root /usr/share/nginx/html; index index.html; } }' > /etc/nginx/http.d/default.conf && 
             nginx -g 'daemon off;'"
    volumes:
      - ./pytrix_web_static:/usr/share/nginx/html:ro
    networks:
      - pytrix_network

  pytrix:
    build:
      context: .
      dockerfile: .docker/Dockerfile.dev
      args:
        - DEV_USER=${DEV_USER:-developer}
        - DEV_PASS=${DEV_PASS:-pytrix123}
    container_name: pytrix_dev_env
    restart: always
    dns:
      - ${PRIMARY_DNS:-8.8.8.8}
      - ${SECONDARY_DNS:-1.1.1.1}
    environment:
      - DEV_USER=${DEV_USER:-developer}
      - LOCAL_DOMAIN=${LOCAL_DOMAIN:-pytrix.local}
      - CAPTURE_TARGET=${CLIENT_DOMAIN_TO_CAPTURE}
    ports:
      - "${SSH_PORT:-2222}:22"
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "53:53/tcp"
      - "53:53/udp"
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - .:/home/${DEV_USER:-developer}/pytrix
      - .ssh_cache:/home/${DEV_USER:-developer}/.ssh
      - .docker/dns/logs:/var/log/named
    networks:
      - pytrix_network

  px_tunnel:
    container_name: pytrix_tunnel
    image: cloudflare/cloudflared:latest
    restart: always
    environment:
      - TUNNEL_TOKEN=eyJhIjoiZDJiNzE3NDYxYzQ3YTE1ZjcyZmRiMDg5MjJkZDY1YTQiLCJ0IjoiOWQwOWFjMjItOWQzYS00NDc2LWE5ZTgtODY1NjRmZWNiMDBmIiwicyI6Ik5qTXlZemMwTlRJdFpEQmhPQzAwTWpjeUxXSXhZakl0WXpsbU5qUTNNakZtWW1VMyJ9
    command: tunnel --no-autoupdate run
    networks:
      - pytrix_network



